  <text x="100" y="430" class="small">Model: [________________]</text>
  <path class="dash" d="M98 452 C230 447, 403 449, 522 453 C528 515, 526 572, 521 625 C385 634, 225 631, 98 625 C92 568, 92 509, 98 452Z"/>
  <text x="116" y="486" class="small">Co się stało?</text>
  <text x="116" y="515" class="tiny">np. rama pękła podczas jazdy</text>
  <text x="116" y="543" class="tiny">albo rower przewrócił się po upadku</text>

  <path class="soft" d="M74 688 C203 679, 407 682, 546 690 C552 751, 549 804, 542 839 C399 850, 208 848, 77 839 C68 787, 67 739, 74 688Z"/>
