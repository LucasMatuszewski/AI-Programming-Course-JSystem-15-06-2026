  <path class="button" d="M368 838 C429 833, 502 835, 548 840 C554 863, 552 880, 546 894 C494 899, 421 897, 369 893 C363 875, 362 856, 368 838Z"/>
  <text x="405" y="869" class="small">Wyślij</text>
